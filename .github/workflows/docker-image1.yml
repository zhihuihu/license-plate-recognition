name: Build and publish Docker image

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source and Git LFS models
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Verify model files are not LFS pointers
        shell: bash
        run: |
          set -euo pipefail
          git lfs pull
          test "$(wc -c < models/hyperlpr3/.hyperlpr3/20230229/onnx/y5fu_640x_sim.onnx)" -gt 1000000
          test "$(wc -c < models/paddleocr/PP-OCRv6_medium_det_infer/inference.pdiparams)" -gt 1000000
          test "$(wc -c < models/paddleocr/PP-OCRv6_medium_rec_infer/inference.pdiparams)" -gt 1000000
          test "$(wc -c < models/paddleocr/PP-LCNet_x1_0_textline_ori_infer/inference.pdiparams)" -gt 1000000

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
